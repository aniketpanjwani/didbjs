name: R CMD check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  r-cmd-check:
    name: ${{ matrix.os }} / R ${{ matrix.r }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        r: [oldrel, release, devel]

    env:
      R_KEEP_PKG_SOURCE: yes
      R_CHECK_CRAN_INCOMING_REMOTE_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Configure macOS gettext headers
        if: runner.os == 'macOS'
        run: |
          brew install gettext
          mkdir -p ~/.R
          gettext_prefix="$(brew --prefix gettext)"
          {
            echo "PKG_CPPFLAGS += -I${gettext_prefix}/include"
            echo "PKG_LIBS += -L${gettext_prefix}/lib -lintl"
            echo "CPPFLAGS += -I${gettext_prefix}/include"
            echo "LDFLAGS += -L${gettext_prefix}/lib"
          } >> ~/.R/Makevars

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Check
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual", "--no-build-vignettes")'
          build_args: 'c("--no-manual", "--no-build-vignettes")'
          error-on: '"warning"'
