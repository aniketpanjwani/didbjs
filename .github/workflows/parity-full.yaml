name: Full parity tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "R/**"
      - "tests/**"
      - "inst/spec/**"
      - "tools/parity/**"
      - "DESCRIPTION"
      - "NAMESPACE"

jobs:
  full-parity:
    runs-on: ubuntu-latest

    env:
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check

      - name: Validate feature contract
        run: python3 tools/parity/validate_contract.py

      - name: Run full source tests
        run: Rscript -e 'testthat::test_local(reporter = "summary")'
